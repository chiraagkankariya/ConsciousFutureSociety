  <section id="hero">

    <canvas id="stars"></canvas>
    <div id="nebula"></div>
    <div id="ambient-glow"></div>

    <!-- Beings -->
    <div id="stage">
      <img class="being" id="original" src="assets/being.png" alt="">
      <img class="being" id="clone-1"  src="assets/being.png" alt="">
      <img class="being" id="clone-2"  src="assets/being.png" alt="">
      <img class="being" id="clone-3"  src="assets/being.png" alt="">
      <img class="being" id="clone-4"  src="assets/being.png" alt="">
      <img class="being" id="clone-5"  src="assets/being.png" alt="">
    </div>

    <!-- Covers screen with light at animation end, transitions to next section -->

  </section>

  <!-- Placeholder next section -->
  <div id="next-section">
    <p>Next Section</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
